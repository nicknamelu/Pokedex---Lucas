<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex </title>
    <link rel="icon" href="images/pokebola.jpg">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <header>
        <div class="container text-center ">
            <img src="images/logo_pokedex.png"><img src="images/pokebola_1.png" alt="Pokebola" class="header-image">
        </div>
    </header>
    <nav>
        <br>
        <div class="container text-center">
            <h1 class="mt-4">Buscar um pokemon</h1>
            <input type="text" id="txt-busca" class="form-control mb-3" placeholder="Digite o nome do Pokémon...">
        </div>
    </nav>
    <main>
        <br>
        <div class="container">
            <table>
                <tr>
                    <td>
                        <div id="lista-pokedex" class="d-flex flex-wrap gap-3">
                            <!-- Os cards de cada pokemon -->
                        </div>
                    </td>
                </tr>
            </table>
    </main>
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
